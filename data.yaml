items:
  - id: "item_poke_flute"
    name: "Poke Flute"
    description: "A beautifully crafted flute with a hauntingly soothing melody. A treasured keepsake among Pokemon trainers."
    obtainable: true
    hand: false
    dmg: 0

  - id: "item_cubone_skull"
    name: "Cubone's Skull"
    description: "A small, weathered skull belonging to a Cubone. It feels cold to the touch."
    obtainable: true
    hand: false
    dmg: 0

  - id: "item_thick_bone"
    name: "Thick Bone"
    description: "A bone from a dead pokemon, it could be used as a weapon..."
    obtainable: true
    hand: true
    dmg: 34

  - id: "item_leftovers"
    name: "Leftovers"
    description: "An apple core that restores health little by little. Left behind by a massive Pokemon."
    obtainable: true
    hand: false
    dmg: 0

npcs:
  - id: "npc_club_president"
    name: "Club President"
    description: "An older man wearing a neat suit. He loves talking about his favorite Pokemon."
    dialogue:
      - "A giant Snorlax is blocking the bridge and won't budge. Could you drive it off and bring me the Leftovers it's guarding on the far side?"
      - "[QUEST] Defeat the Snorlax and bring back the Leftovers - To accept the quest, click on the 'QUEST ACCEPT OPTION'"
    hp: 100
    is_hostile: false
    quest_id: "quest_blocked_path"

  - id: "npc_snorlax"
    name: "Snorlax"
    description: "A massive, rotund Pokemon planted squarely across the bridge. It glares at anyone who comes near and flatly refuses to move."
    dialogue:
      - "*Snorlax snorts and blocks the way. It won't let you pass!*"
    hp: 100
    attack_dmg: 49
    is_hostile: true
    quest_id: ""
    combat: false
    blocks_dir: "NORTH"

  - id: "npc_mr_fuji"
    name: "Mr. Fuji"
    description: "A kind old man who cares for orphaned Pokemon."
    dialogue:
      - "There are restless spirits in the Tower. Please, find the Cubone's Skull so its mother can rest."
      - "[QUEST] Find the Cubone's Skull in the Tower - To accept the quest, click on the 'QUEST ACCEPT OPTION'"
    hp: 100
    is_hostile: false
    quest_id: "quest_tower_mystery"

rooms:
  - id: "start"
    name: "Vermilion City"
    description: "A port city facing the ocean. The salty sea breeze fills the air. Paths lead north and east."
    exist:
      NORTH: "route_11"
      EAST: "graveyard"
    items: []
    npcs:
      - "npc_club_president"

  - id: "graveyard"
    name: "Graveyard"
    description: "An old, overgrown Pokemon graveyard. Weathered headstones lean among the weeds, and a heavy, bleached bone lies forgotten on the ground. A path leads north towards a small guard building."
    exist:
      WEST: "start"
      NORTH: "guard_house"
    items:
      - "item_thick_bone"
    npcs: []

  - id: "route_11"
    name: "Route 11"
    description: "A grassy route favored by many trainers, just outside the city. A large bridge is visible to the north, and a small guard building lies to the east."
    exist:
      SOUTH: "start"
      EAST: "guard_house"
      NORTH: "silence_bridge"
    items: []
    npcs: []

  - id: "guard_house"
    name: "Guard House"
    description: "A small checkpoint building connecting the routes. The guard desk is currently empty."
    exist:
      SOUTH: "graveyard"
      WEST: "route_11"
    items: []
    npcs: []

  - id: "silence_bridge"
    name: "Silence Bridge"
    description: "A long wooden bridge suspended over the water. A massive shape blocks the way."
    exist:
      SOUTH: "route_11"
      NORTH: "crossroad"
    items: []
    npcs:
      - "npc_snorlax"

  - id: "crossroad"
    name: "Lavender Crossroad"
    description: "A gloomy intersection where the atmosphere suddenly turns cold. A tall tower looms to the west."
    exist:
      SOUTH: "silence_bridge"
      WEST: "tower"
      NORTH: "lavender_town"
    items:
      - "item_leftovers"
    npcs: []

  - id: "tower"
    name: "Pokemon Tower"
    description: "A solemn, multi-tiered graveyard for departed Pokemon. A thick fog hangs in the air."
    exist:
      EAST: "crossroad"
    items:
      - "item_cubone_skull"
    npcs: []

  - id: "lavender_town"
    name: "Lavender Town"
    description: "A small, quiet town shrouded in a purple mist. It feels both peaceful and eerie."
    exist:
      SOUTH: "crossroad"
    items: []
    npcs:
      - "npc_mr_fuji"

quest:
  - id: "quest_blocked_path"
    description: "Defeat the Snorlax blocking the bridge and bring the Leftovers to the Club President."
    type: "deliver"
    required_item: "item_leftovers"
    reward: "item_poke_flute"
    status: "available"

  - id: "quest_tower_mystery"
    description: "Retrieve Cubone's Skull from the Pokemon Tower and bring it to Mr. Fuji."
    type: "collect"
    required_item: "item_cubone_skull"
    reward: ""
    status: "available"