items:
  - id: "item_ring"
    name: "The One Ring"
    description: "A plain golden ring radiating faint malice."
    obtainable: false
    hand: false
    dmg: 0

  - id: "item_mithril"
    name: "Mithril Shirt"
    description: "Feather-light mail harder than dragon scales. Locked behind glass."
    obtainable: false
    hand: false
    dmg: 0

  - id: "item_ale"
    name: "Prancing Pony Ale"
    description: "A frothy dark pint that restores a traveler's spirit."
    obtainable: true
    hand: false
    dmg: 0

  - id: "item_athelas"
    name: "Athelas Leaves"
    description: "Kingsfoil. A healing herb that cures severe wounds."
    obtainable: true
    hand: false
    dmg: 0

  - id: "item_lembas"
    name: "Lembas Bread"
    description: "Elven waybread. One bite fills the stomach of a grown man."
    obtainable: true
    hand: false
    dmg: 0

  - id: "item_phial"
    name: "Phial of Galadriel"
    description: "A crystal vial holding the light of Eärendil's star."
    obtainable: true
    hand: false
    dmg: 0

  - id: "item_palantir"
    name: "Palantír Shard"
    description: "A cracked seeing-stone fragment, still swirling with dark visions."
    obtainable: true
    hand: false
    dmg: 0

  - id: "item_horn_gondor"
    name: "Horn of Gondor"
    description: "Boromir's great horn. Its call carries for leagues."
    obtainable: true
    hand: false
    dmg: 0

  - id: "item_sword_wood"
    name: "Wooden Training Sword"
    description: "A roughhewn practice blade. Better than bare hands."
    obtainable: true
    hand: true
    dmg: 10

  - id: "item_dagger_shire"
    name: "Hobbit Dagger"
    description: "A short leaf-shaped blade. Light and quick."
    obtainable: true
    hand: true
    dmg: 14

  - id: "item_sword_silver"
    name: "Ranger's Blade"
    description: "A weathered longsword of the Rangers of the North."
    obtainable: true
    hand: true
    dmg: 20

  - id: "item_morgul_blade"
    name: "Morgul Blade"
    description: "A Nazgûl knife, cold to the touch and cursed."
    obtainable: true
    hand: true
    dmg: 25

  - id: "item_sting"
    name: "Sting"
    description: "Bilbo's Elvish blade. Glows blue when orcs are near."
    obtainable: true
    hand: true
    dmg: 38

  - id: "item_anduril"
    name: "Andúril – Flame of the West"
    description: "Narsil reforged. Blazes with runes of power against the darkness."
    obtainable: true
    hand: true
    dmg: 55

npcs:
  - id: "npc_frodo"
    name: "Frodo Baggins"
    description: "A weary hobbit bearing a heavy burden around his neck."
    dialogue:
      - "The Ring must reach Mount Doom. Will you help me carry it?"
      - "[QUEST] Llevar el Anillo al Monte del Destino. Quest ID: quest_destroy_ring — Accept? (yes/no)"
    hp: 50
    is_hostile: false
    quest_id: "quest_destroy_ring"

  - id: "npc_aragorn"
    name: "Aragorn"
    description: "A stern Ranger of the North gripping a broken blade."
    dialogue:
      - "A companion is wounded. I need Athelas — bring it quickly."
      - "[QUEST] Conseguir hojas de Athelas. Quest ID: quest_heal_wounded — Accept? (yes/no)"
    hp: 200
    is_hostile: false
    quest_id: "quest_heal_wounded"

  - id: "npc_gollum"
    name: "Gollum"
    description: "A wretched creature crouching behind a jagged rock."
    dialogue:
      - "Thieves! Murderers! We hates them forever!"
    hp: 60
    attack_dmg: 12
    is_hostile: true
    quest_id: ""
    combat: false

  - id: "npc_bilbo"
    name: "Bilbo Baggins"
    description: "An elderly hobbit scribbling his memoirs at a writing desk."
    dialogue:
      - "My old legs won't carry me to Bree. Fetch me a pint from the Prancing Pony?"
      - "[QUEST] Traer cerveza del Prancing Pony. Quest ID: quest_gather_supplies — Accept? (yes/no)"
    hp: 30
    is_hostile: false
    quest_id: "quest_gather_supplies"

  - id: "npc_gandalf"
    name: "Gandalf the Grey"
    description: "A tall wizard in a grey cloak, leaning on a gnarled staff."
    dialogue:
      - "Something stirs in Moria's depths. I need a scout brave enough to find out what."
      - "[QUEST] Explorar las Minas de Moria. Quest ID: quest_scout_moria — Accept? (yes/no)"
    hp: 300
    is_hostile: false
    quest_id: "quest_scout_moria"

  - id: "npc_legolas"
    name: "Legolas"
    description: "An Elven archer scanning the pass with pale grey eyes."
    dialogue:
      - "A great warg blocks the pass ahead. I cannot leave my post — but you can end it."
      - "[QUEST] Matar al Warg de Cirith Ungol. Quest ID: quest_kill_warg — Accept? (yes/no)"
    hp: 250
    is_hostile: false
    quest_id: "quest_kill_warg"

  - id: "npc_treebeard"
    name: "Treebeard"
    description: "An ancient Ent, slow and deliberate, older than the hills."
    dialogue:
      - "Hrum... Dol Guldur stirs again. I am too slow — venture there and report back."
      - "[QUEST] Explorar Cirith Ungol. Quest ID: quest_explore_dol_guldur — Accept? (yes/no)"
    hp: 800
    is_hostile: false
    quest_id: "quest_explore_dol_guldur"

  - id: "npc_warg"
    name: "Warg of Cirith Ungol"
    description: "A massive black wolf with glowing amber eyes. It snarls as you approach."
    dialogue:
      - "*The warg snaps its jaws and charges!*"
    hp: 120
    attack_dmg: 22
    is_hostile: true
    quest_id: ""
    combat: true

  - id: "npc_balrog"
    name: "Durin's Bane (Balrog)"
    description: "A demon of shadow and flame. Its whip cracks like thunder."
    dialogue:
      - "YOU SHALL NOT PASS!"
    hp: 500
    attack_dmg: 60
    is_hostile: true
    quest_id: ""
    combat: true

rooms:
  - id: "start"
    name: "The Shire — Bag End"
    description: "Rolling green hills and cozy hobbit-holes. Pipe-weed drifts on the warm air. Paths lead North, East, and South."
    exist:
      NORTH: "buckland"
      EAST: "green_dragon"
      SOUTH: "bywater_road"
    items:
      - "item_sword_wood"
      - "item_lembas"
    npcs:
      - "npc_frodo"
      - "npc_bilbo"

  - id: "buckland"
    name: "Buckland — Bucklebury Ferry"
    description: "A misty river hamlet at the Shire's edge. A creaking ferry sways at the dock."
    exist:
      SOUTH: "start"
    items:
      - "item_ale"
      - "item_dagger_shire"
    npcs: []

  - id: "green_dragon"
    name: "The Green Dragon Inn"
    description: "The cosiest tavern in the Shire. Fiddles play and mugs are never empty."
    exist:
      WEST: "start"
    items:
      - "item_ale"
      - "item_horn_gondor"
    npcs: []

  - id: "bywater_road"
    name: "Bywater Road"
    description: "A muddy cart-track winding south toward the wider world. Milestone stones line the verge."
    exist:
      NORTH: "start"
      SOUTH: "bree"
    items:
      - "item_athelas"
    npcs: []

  - id: "bree"
    name: "Bree — The Prancing Pony Inn"
    description: "A noisy tavern where travelers huddle by fireplaces. A hooded stranger sits alone in the corner."
    exist:
      NORTH: "bywater_road"
      WEST: "weathertop"
      EAST: "lothlorien"
      SOUTH: "rivendell"
    items:
      - "item_ale"
      - "item_sword_silver"
    npcs:
      - "npc_aragorn"

  - id: "weathertop"
    name: "Weathertop — Amon Sûl"
    description: "Crumbling ruins atop a barren hill. A biting wind howls through fractured stones."
    exist:
      EAST: "bree"
    items:
      - "item_athelas"
      - "item_morgul_blade"
    npcs:
      - "npc_gandalf"

  - id: "lothlorien"
    name: "Lothlórien — The Golden Wood"
    description: "A luminescent forest of silver light and golden leaves. Time moves differently here."
    exist:
      WEST: "bree"
    items:
      - "item_phial"
      - "item_sting"
    npcs:
      - "npc_treebeard"

  - id: "rivendell"
    name: "Rivendell — The Last Homely House"
    description: "An Elven sanctuary in a steep valley, echoing with distant waterfalls."
    exist:
      NORTH: "bree"
      SOUTH: "moria"
    items:
      - "item_lembas"
      - "item_palantir"
    npcs:
      - "npc_legolas"

  - id: "moria"
    name: "The Mines of Moria — Khazad-dûm"
    description: "A vast cavernous city beneath the mountains. The drumming in the deep grows louder."
    exist:
      NORTH: "rivendell"
      SOUTH: "cirith_ungol"
    items:
      - "item_mithril"
      - "item_anduril"
    npcs:
      - "npc_gollum"

  - id: "cirith_ungol"
    name: "Cirith Ungol — Bridge of Khazad-dûm"
    description: "A narrow bridge over a bottomless abyss. Ancient runes glow on the stone arch. This is where the road ends."
    exist:
      NORTH: "moria"
    items: []
    npcs:
      - "npc_warg"
      - "npc_balrog"

quest:
  - id: "quest_destroy_ring"
    description: "Ayuda a Frodo a llevar el Anillo Único hasta el Monte del Destino."
    type: "deliver"
    required_item: "item_ring"
    reward: "item_mithril"
    status: "available"

  - id: "quest_heal_wounded"
    description: "Busca hojas de Athelas para curar a un compañero herido de Aragorn."
    type: "collect"
    required_item: "item_athelas"
    reward: "item_phial"
    status: "available"

  - id: "quest_gather_supplies"
    description: "Consigue una jarra de cerveza en la Comarca para el viejo Bilbo."
    type: "collect"
    required_item: "item_ale"
    reward: "item_lembas"
    status: "available"

  - id: "quest_scout_moria"
    description: "Gandalf te pide que explores las Minas de Moria."
    type: "explore"
    required_room: "moria"
    reward: "item_palantir"
    status: "available"

  - id: "quest_explore_dol_guldur"
    description: "Treebeard necesita que explores Cirith Ungol y regreses con un informe."
    type: "explore"
    required_room: "cirith_ungol"
    reward: "item_anduril"
    status: "available"

  - id: "quest_kill_warg"
    description: "Legolas te pide que elimines al Warg de Cirith Ungol para despejar el paso."
    type: "kill"
    required_kill: "npc_warg"
    reward: "item_sting"
    status: "available"

  - id: "quest_kill_gollum"
    description: "Elimina a Gollum en las Minas de Moria para asegurar el paso."
    type: "kill"
    required_kill: "npc_gollum"
    reward: "item_athelas"
    status: "available"
